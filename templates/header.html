<style>
  body {
    animation: pageEnter 0.32s ease both;
  }

  body.page-leaving {
    cursor: progress;
  }

  @keyframes pageEnter {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes transitionIn {
    from {
      opacity: 0;
      transform: translateY(-8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes transitionPulse {
    0%,
    100% {
      transform: scaleX(0.4);
      opacity: 0.55;
    }
    50% {
      transform: scaleX(1);
      opacity: 1;
    }
  }

  header {
    position: sticky;
    top: 0;
    z-index: 1000;
    padding: 10px 24px;
    min-height: 64px;
    box-shadow: 0 10px 26px rgba(15, 23, 42, 0.12);
  }

  header .logo {
    gap: 10px;
  }

  header img {
    height: 38px;
    padding: 5px;
    border-radius: 6px;
  }

  header h1,
  header h2 {
    font-size: 18px;
    line-height: 1.2;
    margin: 0;
  }

  header span {
    font-size: 11px;
  }

  header nav {
    gap: 10px;
  }

  header nav a,
  .nav-trigger {
    padding: 8px 13px;
    border-radius: 6px;
    font-size: 14px;
  }

  .nav-menu {
    top: calc(100% + 6px);
  }

  button:disabled,
  input[type="submit"]:disabled {
    cursor: progress;
    opacity: 0.75;
  }

  .page-transition {
    position: fixed;
    top: 76px;
    right: 22px;
    z-index: 3000;
    display: none;
    width: min(310px, calc(100vw - 32px));
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid #dbeafe;
    border-radius: 8px;
    color: #102a56;
    box-shadow: 0 18px 38px rgba(15, 23, 42, 0.16);
    backdrop-filter: blur(10px);
    pointer-events: none;
  }

  .page-transition.active {
    display: block;
    animation: transitionIn 0.34s ease both;
  }

  .transition-content {
    display: grid;
    grid-template-columns: 34px 1fr;
    gap: 11px;
    align-items: center;
    animation: pageEnter 0.24s ease both;
  }

  .transition-logo {
    width: 34px;
    height: 34px;
    object-fit: contain;
    background: white;
    padding: 4px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
  }

  .transition-text {
    margin-bottom: 7px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0;
  }

  .transition-bar {
    width: 100%;
    height: 3px;
    overflow: hidden;
    border-radius: 999px;
    background: #e2e8f0;
  }

  .transition-bar::before {
    content: "";
    display: block;
    width: 100%;
    height: 100%;
    border-radius: inherit;
    background: #2563eb;
    transform-origin: center;
    animation: transitionPulse 0.85s ease-in-out infinite;
  }

  @media (max-width: 900px) {
    header {
      padding: 10px 18px;
    }

    .page-transition {
      top: 78px;
      right: 16px;
      left: 16px;
      width: auto;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    body,
    .page-transition.active,
    .transition-content,
    .transition-bar::before {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }
</style>

<header>
  <div class="logo">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" />
    <h2>Optimasi Rute Distribusi Paket</h2>
  </div>
  <nav>
    <a href="/" class="{% if request.endpoint == 'home' %}active{% endif %}">
      Home
    </a>
    <div class="nav-dropdown">
      <button
        type="button"
        class="nav-trigger {% if request.endpoint in ['input_data', 'hasil'] %}active{% endif %}"
      >
        Data Historis
      </button>
      <div class="nav-menu">
        <a
          href="/input"
          class="{% if request.endpoint == 'input_data' %}active{% endif %}"
        >
          Input Data Historis
        </a>
        <a
          href="/hasil"
          class="{% if request.endpoint == 'hasil' %}active{% endif %}"
        >
          Lihat Hasil Optimasi
        </a>
      </div>
    </div>
    <div class="nav-dropdown align-right">
      <button
        type="button"
        class="nav-trigger {% if request.endpoint in ['input_penugasan', 'input_pemetaan', 'hasil_pemetaan'] %}active{% endif %}"
      >
        Data Aktual
      </button>
      <div class="nav-menu">
        <a
          href="/input-penugasan"
          class="{% if request.endpoint == 'input_penugasan' %}active{% endif %}"
        >
          Kelola Penugasan Kurir
        </a>
        <a
          href="/input-pemetaan"
          class="{% if request.endpoint == 'input_pemetaan' %}active{% endif %}"
        >
          Input Data
        </a>
        <a
          href="/hasil-pemetaan"
          class="{% if request.endpoint == 'hasil_pemetaan' %}active{% endif %}"
        >
          Lihat Hasil Optimasi
        </a>
      </div>
    </div>
  </nav>
</header>

<div class="page-transition" id="pageTransition" aria-hidden="true">
  <div class="transition-content">
    <img
      class="transition-logo"
      src="{{ url_for('static', filename='img/logo.png') }}"
      alt=""
    />
    <div>
      <div class="transition-text" id="pageTransitionText">
        Memuat halaman...
      </div>
      <div class="transition-bar"></div>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const transition = document.getElementById("pageTransition");
    if (!transition) return;
    const transitionText = document.getElementById("pageTransitionText");

    const currentUrl = new URL(window.location.href);
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
    const nativeSubmit = HTMLFormElement.prototype.submit;

    function showPageProcess(message) {
      if (transitionText && message) {
        transitionText.textContent = message;
      }
      document.body.classList.add("page-leaving");
      transition.classList.add("active");
    }

    function getFormProcessMessage(form) {
      if (form.dataset.loadingText) {
        return form.dataset.loadingText;
      }

      const method = (form.getAttribute("method") || "GET").toUpperCase();
      const enctype = (form.getAttribute("enctype") || "").toLowerCase();

      if (enctype.includes("multipart/form-data")) {
        return "Mengunggah dan memproses file...";
      }
      if (method === "GET") {
        return "Memuat hasil...";
      }
      return "Sedang memproses data...";
    }

    function disableFormActions(form) {
      form.querySelectorAll('button[type="submit"], input[type="submit"]').forEach(
        (button) => {
          button.disabled = true;
          button.dataset.originalText = button.textContent;
          button.textContent = "Memproses...";
        }
      );
    }

    window.showPageProcess = showPageProcess;

    if (!HTMLFormElement.prototype.submitWithProcess) {
      HTMLFormElement.prototype.submitWithProcess = true;
      HTMLFormElement.prototype.submit = function () {
        showPageProcess(getFormProcessMessage(this));
        disableFormActions(this);
        nativeSubmit.call(this);
      };
    }

    document.querySelectorAll("form").forEach((form) => {
      form.addEventListener("submit", function () {
        showPageProcess(getFormProcessMessage(form));
        disableFormActions(form);
      });
    });

    document.querySelectorAll('a[href]').forEach((link) => {
      link.addEventListener("click", function (event) {
        if (
          event.defaultPrevented ||
          event.button !== 0 ||
          event.metaKey ||
          event.ctrlKey ||
          event.shiftKey ||
          event.altKey ||
          link.target ||
          link.hasAttribute("download")
        ) {
          return;
        }

        const nextUrl = new URL(link.href, window.location.href);
        const isSamePage =
          nextUrl.origin === currentUrl.origin &&
          nextUrl.pathname === currentUrl.pathname &&
          nextUrl.search === currentUrl.search;

        if (nextUrl.origin !== currentUrl.origin || isSamePage) {
          return;
        }

        event.preventDefault();
        showPageProcess("Memuat halaman...");

        const delay = reducedMotion.matches ? 60 : 380;
        window.setTimeout(() => {
          window.location.href = nextUrl.href;
        }, delay);
      });
    });
  });
</script>
